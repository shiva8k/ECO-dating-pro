{% extends "base.html" %}

{% block title %}Payment Failed | ECO{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-4.5rem)] flex items-center justify-center py-12 px-4 fade-in-up">
    <div class="glass-card p-8 sm:p-10 max-w-md w-full text-center">
        <p class="eco-kicker mb-2">Payment status</p>
        <h1 class="text-2xl font-black text-white mb-3">Payment not completed</h1>
        <p class="text-white/55 text-sm mb-6">Your premium subscription was not activated. You can try again anytime.</p>
        <a class="btn-premium w-full inline-flex justify-center" href="{% url 'premium_plans' %}">Try again</a>
    </div>
</section>
{% endblock %}
