{% extends "base.html" %}

{% block title %}Log in | ECO{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-4.5rem)] flex items-center justify-center py-12 px-4 fade-in-up">
    <div class="glass-card p-8 sm:p-10 w-full max-w-md">
        <div class="text-center mb-8">
            <p class="eco-kicker mb-2">Welcome back</p>
            <h1 class="text-3xl font-black gradient-text">Log in to ECO</h1>
            <p class="text-white/55 text-sm mt-2">Continue your ECO journey.</p>
        </div>
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-white/85 mb-2" for="{{ form.username.id_for_label }}">Username</label>
                {{ form.username }}
            </div>
            <div>
                <label class="block text-sm font-semibold text-white/85 mb-2" for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn-premium w-full">Log in</button>
        </form>
        <p class="mt-8 text-center text-white/55 text-sm">
            Don't have an account? <a href="{% url 'signup' %}" class="text-pink-400 font-semibold hover:text-pink-300">Sign up</a>
        </p>
    </div>
</section>
{% endblock %}
