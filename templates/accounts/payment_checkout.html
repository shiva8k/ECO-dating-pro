{% extends "base.html" %}

{% block title %}Checkout | ECO Premium{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-4.5rem)] flex items-center justify-center py-12 px-4 fade-in-up">
    <div class="glass-card p-8 sm:p-10 w-full max-w-md text-center">
        <p class="eco-kicker mb-2">Secure checkout</p>
        <h1 class="text-2xl font-black text-white mb-2">{{ plan.name }}</h1>
        <p class="text-4xl font-black gradient-text mb-6">₹{{ plan.price_inr }}</p>
        <button id="rzp-button" class="btn-premium w-full mb-3" type="button">Pay with Razorpay</button>
        <a class="btn-ghost w-full inline-flex justify-center" href="{% url 'premium_plans' %}">Cancel</a>
    </div>
</section>

<form id="payment-success-form" method="post" action="{% url 'payment_success' %}" class="hidden">
    {% csrf_token %}
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
    <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
    <input type="hidden" name="razorpay_signature" id="razorpay_signature">
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    const options = {
        key: "{{ razorpay_key_id }}",
        amount: "{{ order.amount }}",
        currency: "{{ order.currency }}",
        name: "ECO Premium",
        description: "{{ plan.name }}",
        order_id: "{{ order.id }}",
        handler: function(response) {
            document.getElementById("razorpay_payment_id").value = response.razorpay_payment_id;
            document.getElementById("razorpay_order_id").value = response.razorpay_order_id;
            document.getElementById("razorpay_signature").value = response.razorpay_signature;
            document.getElementById("payment-success-form").submit();
        },
        modal: {
            ondismiss: function() {
                window.location.href = "{% url 'payment_failure' %}";
            }
        },
        theme: {
            color: "#ec4899"
        }
    };

    document.getElementById("rzp-button").onclick = function(event) {
        event.preventDefault();
        new Razorpay(options).open();
    };
</script>
{% endblock %}
